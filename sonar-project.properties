sonar.projectKey=wheel-of-fortune
sonar.projectName=Wheel of Fortune
sonar.projectVersion=1.0.0
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.js,**/*.test.jsx
sonar.coverage.exclusions=**/*.test.js,**/*.test.jsx,src/index.js
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.exclusions=node_modules/**,build/**,coverage/**
sonar.sourceEncoding=UTF-8

# Security rules
sonar.security.hotspots.enabled=true

# Performance rules
sonar.performance.enabled=true

# Code smells
sonar.code.smells.enabled=true

# Bugs
sonar.bugs.enabled=true

# Vulnerabilities
sonar.vulnerabilities.enabled=true
